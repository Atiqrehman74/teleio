<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Clip everything to diamond boundary -->
    <clipPath id="dclip">
      <polygon points="100,3 197,100 100,197 3,100"/>
    </clipPath>
  </defs>

  <!-- All blue maze walls, clipped to diamond shape -->
  <g clip-path="url(#dclip)" fill="#1B2FA8">

    <!-- ── OUTER ARMS (from each diamond tip inward) ── -->
    <!-- Top arm: two bars flanking center corridor -->
    <rect x="3"   y="3"   width="200" height="200"/>
    <!-- Punch transparent "passages" by overdrawing white below -->
  </g>

  <!-- Transparent diamond background (mask the outside) -->
  <!-- Strategy: flood fill blue inside diamond, then cut white passages -->

  <!-- Step 1: full blue diamond -->
  <polygon points="100,3 197,100 100,197 3,100" fill="#1B2FA8"/>

  <!-- Step 2: white passages create the maze -->
  <g clip-path="url(#dclip)">
    <!-- CENTER open zone -->
    <rect x="76" y="76" width="48" height="48" fill="white"/>

    <!-- TOP corridor (vertical, center) -->
    <rect x="88" y="3"  width="24" height="73" fill="white"/>

    <!-- BOTTOM corridor -->
    <rect x="88" y="124" width="24" height="73" fill="white"/>

    <!-- LEFT corridor -->
    <rect x="3"  y="88" width="73" height="24" fill="white"/>

    <!-- RIGHT corridor -->
    <rect x="124" y="88" width="73" height="24" fill="white"/>

    <!-- TOP-LEFT inner notch (opens corner of the inner ring) -->
    <rect x="52" y="52" width="24" height="24" fill="white"/>

    <!-- TOP-RIGHT inner notch -->
    <rect x="124" y="52" width="24" height="24" fill="white"/>

    <!-- BOTTOM-LEFT inner notch -->
    <rect x="52" y="124" width="24" height="24" fill="white"/>

    <!-- BOTTOM-RIGHT inner notch -->
    <rect x="124" y="124" width="24" height="24" fill="white"/>

    <!-- TOP-LEFT arm corridor (horizontal leg going to left wall) -->
    <rect x="3"  y="52" width="49" height="24" fill="white"/>
    <!-- TOP-LEFT arm corridor (vertical leg going to top wall) -->
    <rect x="52" y="3"  width="24" height="49" fill="white"/>

    <!-- TOP-RIGHT arm corridor (horizontal leg going to right wall) -->
    <rect x="148" y="52" width="49" height="24" fill="white"/>
    <!-- TOP-RIGHT arm corridor (vertical leg going to top wall) -->
    <rect x="124" y="3"  width="24" height="49" fill="white"/>

    <!-- BOTTOM-LEFT arm corridor (horizontal) -->
    <rect x="3"   y="124" width="49" height="24" fill="white"/>
    <!-- BOTTOM-LEFT arm corridor (vertical) -->
    <rect x="52"  y="148" width="24" height="49" fill="white"/>

    <!-- BOTTOM-RIGHT arm corridor (horizontal) -->
    <rect x="148" y="124" width="49" height="24" fill="white"/>
    <!-- BOTTOM-RIGHT arm corridor (vertical) -->
    <rect x="124" y="148" width="24" height="49" fill="white"/>
  </g>

  <!-- Step 3: Restore the blue inner cross-walls (maze walls between corridors) -->
  <g clip-path="url(#dclip)">
    <!-- Horizontal wall across the center — creates the labyrinth feel -->
    <rect x="76" y="88"  width="48" height="24" fill="#1B2FA8"/>
    <!-- Vertical wall through center -->
    <rect x="88" y="76"  width="24" height="48" fill="#1B2FA8"/>
    <!-- Small corner connectors -->
    <rect x="76" y="76"  width="12" height="12" fill="#1B2FA8"/>
    <rect x="112" y="76" width="12" height="12" fill="#1B2FA8"/>
    <rect x="76" y="112" width="12" height="12" fill="#1B2FA8"/>
    <rect x="112" y="112" width="12" height="12" fill="#1B2FA8"/>
  </g>

  <!-- Step 4: Cyan center diamond (on top of everything) -->
  <rect x="91" y="91" width="18" height="18"
        transform="rotate(45 100 100)"
        fill="#00C8E0"/>
</svg>
