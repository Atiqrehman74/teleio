<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Teleio Tourism</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0F172A; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 24px; }

    .wrap { width: 100%; max-width: 420px; }

    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .logo h1 { color: #fff; font-size: 22px; font-weight: 800; }
    .logo p  { color: #64748B; font-size: 13px; margin-top: 4px; }

    .badge { display: inline-flex; align-items: center; gap: 6px;
      background: rgba(79,70,229,.15); border: 1px solid rgba(79,70,229,.3);
      color: #818CF8; border-radius: 50px; padding: 4px 14px; font-size: 12px;
      font-weight: 600; margin-bottom: 24px; }

    .card { background: #1E293B; border: 1px solid #334155; border-radius: 18px; padding: 32px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; color: #94A3B8; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .field input { width: 100%; background: #0F172A; border: 1.5px solid #334155;
      border-radius: 10px; padding: 11px 14px; color: #F1F5F9; font-size: 14px;
      font-family: inherit; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: #4F46E5; }
    .field input::placeholder { color: #475569; }

    .btn-login { width: 100%; background: linear-gradient(135deg,#4F46E5,#7C3AED);
      color: #fff; border: none; border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity .15s; margin-top: 8px; }
    .btn-login:hover { opacity: .9; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .error { background: #7F1D1D; border: 1px solid #EF4444; color: #FCA5A5;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }

    .hint { background: #0F172A; border: 1px solid #1E3A5F; border-radius: 10px;
      padding: 16px; margin-top: 20px; }
    .hint h4 { color: #60A5FA; font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 10px; }
    .hint-row { display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #1E293B; }
    .hint-row:last-child { border-bottom: none; }
    .role-badge { font-size: 11px; font-weight: 700; border-radius: 50px; padding: 2px 10px; }
    .hint-cred { color: #94A3B8; font-size: 12px; font-family: monospace; }

    .back { text-align: center; margin-top: 20px; }
    .back a { color: #475569; font-size: 13px; text-decoration: none; transition: color .15s; }
    .back a:hover { color: #94A3B8; }
  </style>
</head>
<body>
<script src="../js/admin-auth.js"></script>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Teleio Tourism</h1>
    <p>Administration Panel</p>
  </div>

  <div style="text-align:center;margin-bottom:24px">
    <div class="badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Restricted Access
    </div>
  </div>

  <div class="card">
    <div id="login-error" class="error"></div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field">
        <label>Admin Email</label>
        <input type="email" id="a-email" placeholder="superadmin@teleio.com" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="a-pass" placeholder="Enter admin password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In to Admin Panel</button>
    </form>

    <!-- Demo credentials -->
    <div class="hint">
      <h4>&#x1F511; Demo Credentials (all use same password)</h4>
      <div class="hint-row">
        <span class="role-badge" style="background:#F3EDFF;color:#7C3AED">Super Admin</span>
        <span class="hint-cred">superadmin@teleio.com</span>
      </div>
      <div class="hint-row">
        <span class="role-badge" style="background:#EFF6FF;color:#2563EB">Admin</span>
        <span class="hint-cred">ahmed@teleio.com</span>
      </div>
      <div class="hint-row">
        <span class="role-badge" style="background:#ECFDF5;color:#059669">Manager</span>
        <span class="hint-cred">sara@teleio.com</span>
      </div>
      <div class="hint-row">
        <span class="role-badge" style="background:#FFFBEB;color:#D97706">Agent</span>
        <span class="hint-cred">khalid@teleio.com</span>
      </div>
      <div class="hint-row">
        <span class="role-badge" style="background:#F9FAFB;color:#6B7280">Viewer</span>
        <span class="hint-cred">priya@teleio.com</span>
      </div>
      <p style="color:#475569;font-size:11.5px;margin-top:10px">
        Password for all: <code style="color:#60A5FA">Admin@2026!</code>
      </p>
    </div>
  </div>

  <div class="back">
    <a href="../index.html">&#x2190; Back to main site</a>
  </div>
</div>

<script>
  if (ADMIN_AUTH.isAuthenticated()) window.location.href = 'admin.html';

  async function doLogin(e) {
    e.preventDefault();
    var btn = document.getElementById('login-btn');
    var err = document.getElementById('login-error');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.style.display = 'none';
    try {
      await ADMIN_AUTH.signIn(
        document.getElementById('a-email').value,
        document.getElementById('a-pass').value
      );
      window.location.href = 'admin.html';
    } catch(ex) {
      err.textContent = ex.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In to Admin Panel';
    }
  }
</script>
</body>
</html>
