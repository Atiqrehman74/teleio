<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passport Index – Explore World Passports | Teleio Tourism</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/css/jsvectormap.min.css">
  <style>
    body { margin:0; }
    #pi-page { background:#0d0d0d; min-height:100vh; font-family:'Inter',sans-serif; color:#fff; padding-top:76px; }

    /* ── Hero ── */
    .pi-hero { background:#0d0d0d; padding:48px 24px 32px; text-align:center; border-bottom:1px solid #1e1e1e; }
    .pi-hero h1 { font-size:clamp(22px,4vw,40px); font-weight:800; color:#c9a84c; margin:0 0 8px; letter-spacing:-0.5px; }
    .pi-hero p  { color:#888; font-size:14px; margin:0 0 28px; }
    .pi-search-bar { display:flex; align-items:center; gap:0; max-width:560px; margin:0 auto; background:#1a1a1a; border:1px solid #2e2e2e; border-radius:6px; overflow:hidden; }
    .pi-search-bar input { flex:1; background:transparent; border:none; padding:13px 18px; color:#fff; font-size:15px; outline:none; }
    .pi-search-bar input::placeholder { color:#555; }
    .pi-search-bar button { background:#c9a84c; color:#000; border:none; padding:13px 28px; font-weight:800; font-size:13px; letter-spacing:1px; cursor:pointer; transition:background .2s; }
    .pi-search-bar button:hover { background:#e0bc60; }

    /* ── Filter bar ── */
    .pi-filters { display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:14px 24px; background:#111; border-bottom:1px solid #1e1e1e; }
    .pi-filters select { background:#1a1a1a; color:#aaa; border:1px solid #2a2a2a; border-radius:5px; padding:7px 12px; font-size:13px; outline:none; cursor:pointer; }
    .pi-filters select:focus { border-color:#c9a84c; }
    .pi-count { margin-left:auto; color:#555; font-size:12px; }

    /* ── Passport Grid ── */
    .pi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:6px; padding:16px 20px 40px; max-width:1600px; margin:0 auto; }

    /* ── Passport Card (thumbnail) ── */
    .pi-card { cursor:pointer; text-align:center; transition:transform .18s; }
    .pi-card:hover { transform:scale(1.06); z-index:2; position:relative; }
    .pi-book-thumb {
      position:relative; width:100%; aspect-ratio:0.7; border-radius:3px 6px 6px 3px;
      overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:-3px 3px 10px rgba(0,0,0,.7);
    }
    .pi-book-thumb::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:10%;
      background:rgba(0,0,0,.35); border-radius:3px 0 0 3px;
    }
    .pi-book-thumb img.pi-flag { width:65%; aspect-ratio:3/2; object-fit:cover; border-radius:2px; box-shadow:0 2px 8px rgba(0,0,0,.5); }
    .pi-book-thumb .pi-country-label { font-size:8px; text-transform:uppercase; letter-spacing:.5px; color:rgba(255,255,255,.75); margin-top:5px; font-weight:600; padding:0 6px; line-height:1.3; }
    .pi-card-name { font-size:10px; color:#777; margin-top:5px; line-height:1.3; }
    .pi-rank-badge { position:absolute; top:4px; right:5px; background:rgba(201,168,76,.9); color:#000; font-size:7px; font-weight:800; padding:1px 4px; border-radius:3px; }

    /* ── Detail Modal ── */
    .pi-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
    .pi-modal-overlay.hidden { display:none; }
    .pi-modal { background:#111; border:1px solid #222; border-radius:12px; width:min(420px,100%); padding:36px 28px 28px; text-align:center; position:relative; }
    .pi-modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:#555; font-size:24px; cursor:pointer; line-height:1; }
    .pi-modal-close:hover { color:#fff; }
    .pi-modal-label { font-size:11px; letter-spacing:2px; color:#c9a84c; font-weight:600; margin-bottom:6px; }
    .pi-modal-country { font-size:clamp(24px,5vw,36px); font-weight:900; color:#fff; margin-bottom:24px; line-height:1.1; }

    /* Large passport book in modal */
    .pi-book-large {
      width:200px; aspect-ratio:0.68; border-radius:4px 10px 10px 4px; margin:0 auto 24px;
      display:flex; flex-direction:column; align-items:center; justify-content:space-between;
      padding:20px 16px 16px; box-shadow:-8px 8px 28px rgba(0,0,0,.8); position:relative; overflow:hidden;
    }
    .pi-book-large::before { content:''; position:absolute; left:0; top:0; bottom:0; width:14%; background:rgba(0,0,0,.4); border-radius:4px 0 0 4px; }
    .pi-book-large .pi-book-text { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:rgba(255,255,255,.7); font-weight:600; }
    .pi-book-large .pi-book-emblem { font-size:52px; margin:4px 0; }
    .pi-book-large img.pi-flag-lg { width:80%; aspect-ratio:3/2; object-fit:cover; border-radius:4px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
    .pi-book-large .pi-book-passport { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.6); font-weight:700; border-top:1px solid rgba(255,255,255,.15); padding-top:10px; width:100%; text-align:center; }

    /* Stats row */
    .pi-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:0; border:1px solid #2a2a2a; border-radius:8px; overflow:hidden; margin-bottom:20px; }
    .pi-stat { padding:14px 8px; text-align:center; border-right:1px solid #2a2a2a; }
    .pi-stat:last-child { border-right:none; }
    .pi-stat .val { font-size:clamp(20px,4vw,28px); font-weight:900; color:#fff; display:block; }
    .pi-stat .lbl { font-size:10px; color:#c9a84c; font-weight:700; letter-spacing:.5px; display:block; margin-top:3px; }

    /* Buttons */
    .pi-btn-dashboard { width:100%; padding:14px; background:#c9a84c; color:#000; border:none; border-radius:8px; font-weight:800; font-size:14px; letter-spacing:1px; cursor:pointer; transition:background .2s; }
    .pi-btn-dashboard:hover { background:#e0bc60; }

    /* ── Dashboard Modal ── */
    .pi-dash-overlay { position:fixed; inset:0; background:#0d0d0d; z-index:1100; overflow-y:auto; }
    .pi-dash-overlay.hidden { display:none; }
    .pi-dash-header { display:flex; align-items:center; gap:14px; padding:20px 28px; border-bottom:1px solid #1e1e1e; background:#111; }
    .pi-dash-header img.flag-sm { width:40px; height:27px; object-fit:cover; border-radius:3px; }
    .pi-dash-header h2 { font-size:clamp(14px,2.5vw,20px); font-weight:800; color:#fff; margin:0; flex:1; }
    .pi-dash-back { background:none; border:1px solid #333; color:#aaa; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; transition:all .2s; }
    .pi-dash-back:hover { border-color:#c9a84c; color:#c9a84c; }

    .pi-dash-body { display:grid; grid-template-columns:220px 1fr 310px; min-height:calc(100vh - 70px); }
    @media(max-width:900px) { .pi-dash-body { grid-template-columns:1fr; } }

    /* Left sidebar */
    .pi-dash-left { padding:24px 20px; border-right:1px solid #1e1e1e; display:flex; flex-direction:column; align-items:center; gap:16px; }
    .pi-dash-book { width:130px; aspect-ratio:0.68; border-radius:3px 8px 8px 3px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:14px 10px 10px; box-shadow:-6px 6px 20px rgba(0,0,0,.8); position:relative; overflow:hidden; }
    .pi-dash-book::before { content:''; position:absolute; left:0; top:0; bottom:0; width:14%; background:rgba(0,0,0,.4); border-radius:3px 0 0 3px; }
    .pi-dash-book img { width:78%; aspect-ratio:3/2; object-fit:cover; border-radius:3px; box-shadow:0 3px 12px rgba(0,0,0,.5); }
    .pi-dash-book .db-passport-label { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.55); border-top:1px solid rgba(255,255,255,.12); padding-top:7px; width:100%; text-align:center; font-weight:700; }
    .pi-dash-scores { width:100%; }
    .pi-dash-score-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #1e1e1e; font-size:12px; }
    .pi-dash-score-row:last-child { border-bottom:none; }
    .pi-dash-score-label { color:#666; text-transform:uppercase; font-size:10px; letter-spacing:.5px; }
    .pi-dash-score-val { color:#fff; font-weight:700; }
    .pi-dash-compare { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .pi-dash-compare button { background:#1a1a1a; border:1px solid #2a2a2a; color:#c9a84c; padding:10px; border-radius:6px; font-weight:700; font-size:12px; cursor:pointer; transition:all .2s; }
    .pi-dash-compare button:hover { background:#c9a84c; color:#000; border-color:#c9a84c; }

    /* Center map */
    .pi-dash-center { display:flex; flex-direction:column; padding:16px; }
    #pi-worldmap { flex:1; min-height:340px; }
    .pi-mobility-bar { display:flex; gap:0; border-radius:6px; overflow:hidden; margin-top:12px; font-size:12px; font-weight:700; }
    .pi-bar-seg { display:flex; align-items:center; justify-content:center; padding:8px 4px; color:#000; gap:4px; min-width:28px; }
    .pi-bar-vf  { background:#4caf50; }
    .pi-bar-voa { background:#2196f3; color:#fff; }
    .pi-bar-eta { background:#ff9800; }
    .pi-bar-vr  { background:#f44336; color:#fff; }
    .pi-legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:10px; }
    .pi-legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:#888; }
    .pi-legend-dot { width:10px; height:10px; border-radius:2px; }

    /* Right visa list */
    .pi-dash-right { border-left:1px solid #1e1e1e; display:flex; flex-direction:column; }
    .pi-dash-right-header { padding:16px 18px 10px; }
    .pi-dash-right-header h3 { font-size:11px; color:#c9a84c; letter-spacing:1px; font-weight:700; margin:0 0 10px; text-transform:uppercase; }
    .pi-visa-search { width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:5px; padding:8px 12px; color:#fff; font-size:13px; outline:none; box-sizing:border-box; }
    .pi-visa-search::placeholder { color:#444; }
    .pi-visa-search:focus { border-color:#c9a84c; }
    .pi-visa-filters { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .pi-vf-tab { background:transparent; border:1px solid #2a2a2a; color:#555; padding:4px 10px; border-radius:20px; font-size:11px; cursor:pointer; transition:all .15s; font-weight:600; }
    .pi-vf-tab.active { background:#c9a84c; border-color:#c9a84c; color:#000; }
    .pi-visa-list { flex:1; overflow-y:auto; }
    .pi-visa-row { display:flex; align-items:center; justify-content:space-between; padding:10px 18px; border-bottom:1px solid #161616; transition:background .1s; }
    .pi-visa-row:hover { background:#161616; }
    .pi-visa-country { display:flex; align-items:center; gap:10px; font-size:13px; color:#ddd; }
    .pi-visa-country img { width:28px; height:19px; object-fit:cover; border-radius:2px; }
    .pi-visa-badge { font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; }
    .badge-vf  { background:rgba(76,175,80,.2);  color:#4caf50; border:1px solid rgba(76,175,80,.3); }
    .badge-voa { background:rgba(33,150,243,.2);  color:#64b5f6; border:1px solid rgba(33,150,243,.3); }
    .badge-eta { background:rgba(255,152,0,.2);   color:#ffb74d; border:1px solid rgba(255,152,0,.3); }
    .badge-vr  { background:rgba(244,67,54,.2);   color:#ef9a9a; border:1px solid rgba(244,67,54,.3); }
    .badge-days { background:#1e1e1e; color:#888; border:1px solid #2a2a2a; font-size:9px; padding:2px 7px; border-radius:10px; margin-left:4px; }

    /* jsvectormap override */
    .jvectormap-container { background:#0d0d0d !important; }

    /* Scrollbar */
    .pi-visa-list::-webkit-scrollbar { width:4px; }
    .pi-visa-list::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }

    /* Responsive */
    @media(max-width:600px) {
      .pi-grid { grid-template-columns:repeat(auto-fill,minmax(76px,1fr)); gap:5px; padding:10px 12px 30px; }
      .pi-dash-body { grid-template-columns:1fr; }
      .pi-dash-left, .pi-dash-right { border:none; border-bottom:1px solid #1e1e1e; }
    }
  </style>
</head>
<body>
<script src="../js/nav.js"></script>

<div id="pi-page">

  <!-- Hero -->
  <div class="pi-hero">
    <h1>Explore the world of passports</h1>
    <p>Find your Passport. Explore them all.</p>
    <div class="pi-search-bar">
      <input type="text" id="pi-search" placeholder="Search country…" autocomplete="off">
      <button onclick="piSearch()">FIND</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="pi-filters">
    <select id="pi-region" onchange="piFilter()">
      <option value="">All Regions</option>
      <option value="Europe">Europe</option>
      <option value="Asia">Asia</option>
      <option value="Americas">Americas</option>
      <option value="Africa">Africa</option>
      <option value="Middle East">Middle East</option>
      <option value="Oceania">Oceania</option>
    </select>
    <select id="pi-sort" onchange="piFilter()">
      <option value="rank">Sort by Rank</option>
      <option value="name">Sort by Name</option>
      <option value="score">Sort by Mobility Score</option>
    </select>
    <span id="pi-count" class="pi-count"></span>
  </div>

  <!-- Passport Grid -->
  <div class="pi-grid" id="pi-grid"></div>

</div>

<!-- ── Detail Modal ── -->
<div class="pi-modal-overlay hidden" id="pi-detail-overlay" onclick="if(event.target===this)piCloseDetail()">
  <div class="pi-modal">
    <button class="pi-modal-close" onclick="piCloseDetail()">&#x2715;</button>
    <div class="pi-modal-label">PASSPORT OF</div>
    <div class="pi-modal-country" id="pm-country"></div>
    <div class="pi-book-large" id="pm-book">
      <span class="pi-book-text" id="pm-book-text"></span>
      <img class="pi-flag-lg" id="pm-flag" src="" alt="">
      <div class="pi-book-passport">PASSPORT</div>
    </div>
    <div class="pi-stats">
      <div class="pi-stat"><span class="val" id="pm-score"></span><span class="lbl">MOBILITY SCORE</span></div>
      <div class="pi-stat"><span class="val" id="pm-rank"></span><span class="lbl">GLOBAL RANK</span></div>
      <div class="pi-stat"><span class="val" id="pm-vf"></span><span class="lbl">VISA-FREE</span></div>
    </div>
    <button class="pi-btn-dashboard" onclick="piOpenDash()">DASHBOARD</button>
  </div>
</div>

<!-- ── Dashboard Modal ── -->
<div class="pi-dash-overlay hidden" id="pi-dash-overlay">
  <div class="pi-dash-header">
    <img class="flag-sm" id="pd-flag" src="" alt="">
    <h2 id="pd-title"></h2>
    <button class="pi-dash-back" onclick="piCloseDash()">&#8592; Back</button>
  </div>
  <div class="pi-dash-body">
    <!-- Left -->
    <div class="pi-dash-left">
      <div class="pi-dash-book" id="pd-book">
        <img id="pd-book-flag" src="" alt="">
        <div class="db-passport-label">PASSPORT</div>
      </div>
      <div class="pi-dash-scores" id="pd-scores"></div>
      <div class="pi-dash-compare">
        <button>COMPARE</button>
        <button>IMPROVE</button>
      </div>
    </div>
    <!-- Center: map -->
    <div class="pi-dash-center">
      <div id="pi-worldmap"></div>
      <div class="pi-mobility-bar" id="pd-bar"></div>
      <div class="pi-legend">
        <div class="pi-legend-item"><div class="pi-legend-dot" style="background:#4caf50"></div>Visa-Free</div>
        <div class="pi-legend-item"><div class="pi-legend-dot" style="background:#2196f3"></div>Visa on Arrival</div>
        <div class="pi-legend-item"><div class="pi-legend-dot" style="background:#ff9800"></div>ETA</div>
        <div class="pi-legend-item"><div class="pi-legend-dot" style="background:#f44336"></div>Visa Required</div>
      </div>
    </div>
    <!-- Right: visa list -->
    <div class="pi-dash-right">
      <div class="pi-dash-right-header">
        <h3 id="pd-visa-title">VISA REQUIREMENTS</h3>
        <input class="pi-visa-search" id="pd-visa-search" type="text" placeholder="Find a country…" oninput="pdFilterVisa()">
        <div class="pi-visa-filters">
          <button class="pi-vf-tab active" data-tab="all" onclick="pdTabClick(this)">All</button>
          <button class="pi-vf-tab" data-tab="vf"  onclick="pdTabClick(this)">Visa-Free</button>
          <button class="pi-vf-tab" data-tab="voa" onclick="pdTabClick(this)">On Arrival</button>
          <button class="pi-vf-tab" data-tab="eta" onclick="pdTabClick(this)">ETA</button>
          <button class="pi-vf-tab" data-tab="vr"  onclick="pdTabClick(this)">Visa Required</button>
        </div>
      </div>
      <div class="pi-visa-list" id="pd-visa-list"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/js/jsvectormap.min.js"></script>

/* ── Helpers ──────────────────────────────────────────────────────────────── */
const F = (iso) => `https://flagcdn.com/w80/${iso}.png`;

function passportData(row) {
  return { name:row[0], iso:row[1], color:row[2], rank:row[3], score:row[4],
           vf:row[5], voa:row[6], eta:row[7], vr:row[8], region:row[9] };
}

const ALL = PI.map(passportData);
const BY_ISO = {};
ALL.forEach(p => { BY_ISO[p.iso] = p; });

/* Visa status: simplified tier model */
function visaStatus(srcIso, destIso) {
  if (srcIso === destIso) return 'citizen';
  const src  = BY_ISO[srcIso];
  const dest = BY_ISO[destIso];
  if (!src || !dest) return 'vr';
  const sRank = src.rank, dRank = dest.rank;
  const hardRestricted = ['kp','sy','sd','ss','er','so'];
  if (hardRestricted.includes(destIso) && sRank > 30) return 'vr';
  if (src.vf >= 140) {
    if (hardRestricted.includes(destIso)) return 'vr';
    if (dest.region === 'Africa' && dRank > 75) return 'voa';
    return 'vf';
  }
  if (src.vf >= 110) {
    if (dRank <= 30 && ['Europe','Americas','Oceania'].includes(dest.region)) return 'vf';
    if (hardRestricted.includes(destIso)) return 'vr';
    if (dRank <= 60) return 'vf';
    if (dRank <= 85) return 'voa';
    return 'vr';
  }
  if (src.vf >= 80) {
    if (['Europe'].includes(dest.region) && dRank <= 20) return 'vr';
    if (['Americas','Asia'].includes(dest.region) && dRank <= 40) return 'vr';
    if (dRank <= 70) return 'voa';
    return 'vf';
  }
  // weak passport
  if (['Europe','Americas'].includes(dest.region) && dRank <= 30) return 'vr';
  if (dRank <= 50) return 'vr';
  if (dRank <= 75) return 'voa';
  return 'vf';
}

/* ── State ──────────────────────────────────────────────────────────────── */
let _selected = null;
let _pdVisaTab = 'all';
let _jvMap = null;

/* ── Render Grid ─────────────────────────────────────────────────────────── */
function renderGrid(list) {
  const grid = document.getElementById('pi-grid');
  document.getElementById('pi-count').textContent = list.length + ' passports';
  grid.innerHTML = list.map(p => `
    <div class="pi-card" onclick="piOpenDetail('${p.iso}')">
      <div class="pi-book-thumb" style="background:${p.color}">
        <img class="pi-flag" src="${F(p.iso)}" alt="${p.name}" onerror="this.style.opacity=.3">
        <div class="pi-country-label">${p.name}</div>
        <div class="pi-rank-badge">#${p.rank}</div>
      </div>
      <div class="pi-card-name">${p.name}</div>
    </div>`).join('');
}

/* ── Filter / Search ─────────────────────────────────────────────────────── */
function piFilter() {
  const q      = (document.getElementById('pi-search').value || '').toLowerCase();
  const region = document.getElementById('pi-region').value;
  const sort   = document.getElementById('pi-sort').value;
  let list = ALL.filter(p =>
    (!q || p.name.toLowerCase().includes(q)) &&
    (!region || p.region === region)
  );
  if (sort === 'name')  list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'score') list.sort((a,b) => b.score - a.score);
  else list.sort((a,b) => a.rank - b.rank);
  renderGrid(list);
}

function piSearch() { piFilter(); }
document.getElementById('pi-search').addEventListener('keyup', e => { if(e.key==='Enter') piFilter(); else piFilter(); });

/* ── Detail Modal ────────────────────────────────────────────────────────── */
function piOpenDetail(iso) {
  const p = BY_ISO[iso];
  if (!p) return;
  _selected = p;
  document.getElementById('pm-country').textContent = p.name;
  document.getElementById('pm-book').style.background = `linear-gradient(145deg, ${p.color}, ${p.color}cc, ${p.color})`;
  document.getElementById('pm-book-text').textContent = p.name.toUpperCase();
  document.getElementById('pm-flag').src = F(p.iso);
  document.getElementById('pm-flag').alt = p.name;
  document.getElementById('pm-score').textContent = p.score;
  document.getElementById('pm-rank').textContent = '#' + p.rank;
  document.getElementById('pm-vf').textContent = p.vf;
  document.getElementById('pi-detail-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function piCloseDetail() {
  document.getElementById('pi-detail-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}

/* ── Dashboard Modal ─────────────────────────────────────────────────────── */
function piOpenDash() {
  const p = _selected;
  if (!p) return;
  piCloseDetail();
  document.getElementById('pi-dash-overlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // Header
  document.getElementById('pd-flag').src = F(p.iso);
  document.getElementById('pd-title').textContent = p.name.toUpperCase() + ' PASSPORT DASHBOARD';

  // Left sidebar book
  document.getElementById('pd-book').style.background = `linear-gradient(145deg, ${p.color}, ${p.color}cc)`;
  document.getElementById('pd-book-flag').src = F(p.iso);

  // Scores
  document.getElementById('pd-scores').innerHTML = [
    ['MOBILITY SCORE', p.score],
    ['VISA-FREE', p.vf],
    ['VISA ON ARRIVAL', p.voa],
    ['ETA', p.eta],
    ['VISA REQUIRED', p.vr],
    ['GLOBAL RANK', '#' + p.rank],
  ].map(([l,v]) => `<div class="pi-dash-score-row"><span class="pi-dash-score-label">${l}</span><span class="pi-dash-score-val">${v}</span></div>`).join('');

  // Bar
  const total = p.vf + p.voa + p.eta + p.vr;
  const pct = (n) => Math.max(2, Math.round(n/total*100));
  document.getElementById('pd-bar').innerHTML = `
    <div class="pi-bar-seg pi-bar-vf"  style="flex:${pct(p.vf)}">${p.vf}</div>
    <div class="pi-bar-seg pi-bar-voa" style="flex:${pct(p.voa)}">${p.voa}</div>
    <div class="pi-bar-seg pi-bar-eta" style="flex:${pct(p.eta)}">${p.eta}</div>
    <div class="pi-bar-seg pi-bar-vr"  style="flex:${pct(p.vr)}">${p.vr}</div>`;

  // Visa title
  document.getElementById('pd-visa-title').textContent = p.name.toUpperCase() + ' PASSPORT VISA REQUIREMENTS';

  // Visa list
  _pdVisaTab = 'all';
  document.querySelectorAll('.pi-vf-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'all'));
  renderVisaList(p);

  // Map
  setTimeout(() => renderMap(p), 80);
}

function piCloseDash() {
  document.getElementById('pi-dash-overlay').classList.add('hidden');
  document.body.style.overflow = '';
  if (_jvMap) { try { _jvMap.destroy(); } catch(e){} _jvMap = null; }
  document.getElementById('pi-worldmap').innerHTML = '';
}

/* ── World Map ────────────────────────────────────────────────────────────── */
/* jsvectormap uses uppercase 2-letter codes */
function renderMap(p) {
  const container = document.getElementById('pi-worldmap');
  container.innerHTML = '';
  if (!window.jsVectorMap) return;

  const series = {};
  ALL.forEach(dest => {
    const st = visaStatus(p.iso, dest.iso);
    const key = dest.iso.toUpperCase();
    series[key] = st === 'vf' ? '#4caf50'
                : st === 'voa' ? '#2196f3'
                : st === 'eta' ? '#ff9800'
                : '#f44336';
  });
  series[p.iso.toUpperCase()] = '#c9a84c'; // selected country

  try {
    _jvMap = new jsVectorMap({
      selector: '#pi-worldmap',
      map: 'world',
      backgroundColor: '#0d0d0d',
      regionStyle: {
        initial: { fill:'#1a1a1a', stroke:'#000', strokeWidth:0.5 },
        selected: { fill:'#c9a84c' }
      },
      series: { regions: [{ values: series, attribute:'fill' }] },
      zoomButtons: true,
      zoomOnScroll: true,
    });
  } catch(e) { console.warn('Map error:', e); }
}

/* ── Visa List ────────────────────────────────────────────────────────────── */
const VISA_DAYS = { vf:90, voa:30, eta:90 };
const BADGE = {
  vf:  ['badge-vf', 'VISA-FREE'],
  voa: ['badge-voa','VISA ON ARRIVAL'],
  eta: ['badge-eta','ETA'],
  vr:  ['badge-vr', 'VISA REQUIRED'],
};

function renderVisaList(p) {
  const q   = (document.getElementById('pd-visa-search').value || '').toLowerCase();
  const tab = _pdVisaTab;
  const rows = ALL
    .map(dest => ({ dest, st: visaStatus(p.iso, dest.iso) }))
    .filter(({dest, st}) =>
      st !== 'citizen' &&
      (!q || dest.name.toLowerCase().includes(q)) &&
      (tab === 'all' || st === tab)
    );
  rows.sort((a,b) => a.dest.name.localeCompare(b.dest.name));
  document.getElementById('pd-visa-list').innerHTML = rows.map(({dest,st}) => {
    const [cls, label] = BADGE[st] || ['badge-vr','VISA REQUIRED'];
    const days = VISA_DAYS[st] ? `<span class="badge-days">${VISA_DAYS[st]} days</span>` : '';
    return `<div class="pi-visa-row">
      <div class="pi-visa-country">
        <img src="${F(dest.iso)}" alt="${dest.name}" onerror="this.style.opacity=.3">
        ${dest.name}
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span class="pi-visa-badge ${cls}">${label}</span>${days}
      </div>
    </div>`;
  }).join('');
}

function pdFilterVisa() { renderVisaList(_selected); }
function pdTabClick(btn) {
  _pdVisaTab = btn.dataset.tab;
  document.querySelectorAll('.pi-vf-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderVisaList(_selected);
}

/* ── Init ─────────────────────────────────────────────────────────────────── */
piFilter();
