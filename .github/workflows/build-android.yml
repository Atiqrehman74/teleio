name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug environment
        run: |
          echo "---- ENV ----"
          echo "PATH=$PATH"
          echo "HOME=$HOME"
          echo "sdkmanager: $(command -v sdkmanager || echo 'not found')"
          echo "java: $(command -v java || echo 'not found')"
          java -version || true
          node -v || true
          ls -la $HOME || true
          echo "---- END ENV ----"


      - name: Setup Android SDK
        run: |
          set -e
          export ANDROID_SDK_ROOT=/usr/local/share/android-sdk
          export ANDROID_HOME=/usr/local/share/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          if ! command -v sdkmanager >/dev/null 2>&1; then
            echo "sdkmanager not found; installing command line tools locally"
            mkdir -p $HOME/android-sdk/cmdline-tools
            cd $HOME/android-sdk
            curl -L https://dl.google.com/android/repository/commandlinetools-linux-11499072_latest.zip -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d cmdline-tools
            mv cmdline-tools/cmdline-tools cmdline-tools/latest
            chmod -R a+rX $HOME/android-sdk/cmdline-tools/latest
            export ANDROID_SDK_ROOT=$HOME/android-sdk
            export ANDROID_HOME=$HOME/android-sdk
            export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          fi

          yes | sdkmanager --licenses || true
          yes | sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        env:
          ANDROID_SDK_ROOT: /usr/local/share/android-sdk
          ANDROID_HOME: /usr/local/share/android-sdk
          PATH: /usr/local/share/android-sdk/cmdline-tools/latest/bin:/usr/local/share/android-sdk/platform-tools:$PATH

      - name: Install dependencies
        run: npm ci

      - name: Export Next.js static site
        run: npm run export

      - name: Ensure Capacitor CLI
        run: npm install @capacitor/cli@latest @capacitor/core@latest --no-save

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build Android (release)
        working-directory: android
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleRelease
      - name: Decode keystore (from secret)
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "Decoding keystore"
            mkdir -p android
            echo "$ANDROID_KEYSTORE" | base64 --decode > android/keystore.jks
          else
            echo "ANDROID_KEYSTORE not set; skipping decode"
          fi

      - name: Align APK (zipalign)
        run: |
          APK=android/app/build/outputs/apk/release/app-release-unsigned.apk
          if [ ! -f "$APK" ]; then APK=android/app/build/outputs/apk/release/app-release.apk; fi
          echo "Using APK: $APK"
          ZIPALIGN="$ANDROID_HOME/build-tools/33.0.2/zipalign"
          $ZIPALIGN -v -p 4 "$APK" android/app/build/outputs/apk/release/app-release-aligned.apk

      - name: Sign APK (apksigner)
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            APKSIGNER="$ANDROID_HOME/build-tools/33.0.2/apksigner"
            set -e
            IN=android/app/build/outputs/apk/release/app-release-aligned.apk
            OUT=android/app/build/outputs/apk/release/app-release-signed.apk
            echo "Signing $IN -> $OUT"
            $APKSIGNER sign \
              --ks android/keystore.jks \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass pass:"$STORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out "$OUT" "$IN"
          else
            echo "ANDROID_KEYSTORE not set; skipping signing"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teleio-apk
          path: |
            android/app/build/outputs/apk/release/app-release-signed.apk
            android/app/build/outputs/apk/release/*.apk
